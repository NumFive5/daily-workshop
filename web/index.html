    <script>
      // The value of the "base" tag is set by the build process.
      const base = document.querySelector('base').getAttribute('href');

      // If `baseHref` ends with `/`, we add `/` to the

      if (base.endsWith('/')) {
        window.flutterWebRenderer = "html";
      }
    </script>
